<!-- Toast Notification Container -->
<div class="toast-container" id="toastContainer"></div>

{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const messages = [
        {% for message in messages %}
        {
            type: '{{ message.tags|default:"info" }}',
            text: '{{ message }}',
            icon: {% if message.tags == 'success' %}'check-circle'{% elif message.tags == 'error' %}'exclamation-circle'{% elif message.tags == 'warning' %}'exclamation-triangle'{% else %}'info-circle'{% endif %}
        },
        {% endfor %}
    ];

    const container = document.getElementById('toastContainer');

    messages.forEach((msg, index) => {
        setTimeout(() => {
            showToast(msg.text, msg.type, msg.icon);
        }, index * 150);
    });
});

function showToast(message, type = 'info', icon = 'info-circle') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-message toast-${type}`;
    
    const iconMap = {
        'success': 'check-circle',
        'error': 'exclamation-circle',
        'warning': 'exclamation-triangle',
        'info': 'info-circle'
    };

    const toastIcon = iconMap[type] || icon;

    toast.innerHTML = `
        <div class="toast-icon">
            <i class="bi bi-${toastIcon}"></i>
        </div>
        <div class="toast-content">
            <div class="toast-message-text">${message}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">
            <i class="bi bi-x"></i>
        </button>
    `;

    container.appendChild(toast);

    // Trigger animation
    setTimeout(() => {
        toast.classList.add('show');
    }, 10);

    // Auto dismiss after 4 seconds
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => {
            toast.remove();
        }, 300);
    }, 4000);
}
</script>

<style>
.toast-container {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    pointer-events: none;
}

.toast-message {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: white;
    padding: 1rem 1.5rem;
    border-radius: 0.6rem;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    animation: slideInRight 0.3s ease-out;
    pointer-events: all;
    border-left: 4px solid;
    min-width: 300px;
    max-width: 500px;
    transition: all 0.3s ease;
}

.toast-message.show {
    opacity: 1;
    transform: translateX(0);
}

.toast-message:not(.show) {
    opacity: 0;
    transform: translateX(20px);
    animation: slideOutRight 0.3s ease-out;
}

@keyframes slideInRight {
    from {
        opacity: 0;
        transform: translateX(20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes slideOutRight {
    from {
        opacity: 1;
        transform: translateX(0);
    }
    to {
        opacity: 0;
        transform: translateX(20px);
    }
}

/* Success Toast */
.toast-success {
    border-left-color: #28a745;
    background: linear-gradient(135deg, #f0f9ff 0%, #f5fffa 100%);
}

.toast-success .toast-icon {
    color: #28a745;
}

.toast-success .toast-message-text {
    color: #155724;
}

/* Error Toast */
.toast-error {
    border-left-color: #dc3545;
    background: linear-gradient(135deg, #fff5f5 0%, #ffebee 100%);
}

.toast-error .toast-icon {
    color: #dc3545;
}

.toast-error .toast-message-text {
    color: #721c24;
}

/* Warning Toast */
.toast-warning {
    border-left-color: #ffc107;
    background: linear-gradient(135deg, #fffbf0 0%, #fff8e1 100%);
}

.toast-warning .toast-icon {
    color: #ffc107;
}

.toast-warning .toast-message-text {
    color: #856404;
}

/* Info Toast */
.toast-info {
    border-left-color: #17a2b8;
    background: linear-gradient(135deg, #f0f8ff 0%, #e0f7ff 100%);
}

.toast-info .toast-icon {
    color: #17a2b8;
}

.toast-info .toast-message-text {
    color: #0c5460;
}

.toast-icon {
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.toast-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.toast-message-text {
    font-weight: 500;
    font-size: 0.95rem;
    line-height: 1.4;
}

.toast-close {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    padding: 0.25rem;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    transition: color 0.2s ease;
    flex-shrink: 0;
}

.toast-close:hover {
    color: #333;
}

/* Mobile Responsive */
@media (max-width: 640px) {
    .toast-container {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
    }

    .toast-message {
        min-width: auto;
        max-width: 100%;
    }
}

@media (max-width: 480px) {
    .toast-container {
        bottom: 0.5rem;
        right: 0.5rem;
        left: 0.5rem;
    }

    .toast-message {
        padding: 0.8rem 1rem;
        gap: 0.8rem;
    }

    .toast-icon {
        font-size: 1.2rem;
    }

    .toast-message-text {
        font-size: 0.9rem;
    }
}
</style>
{% endif %}
