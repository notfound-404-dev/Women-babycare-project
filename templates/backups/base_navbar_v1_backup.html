{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women & Baby Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<!-- Modern Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="navbar-container">
        <!-- Left: Logo and Brand -->
        <a class="navbar-brand navbar-brand-custom" href="{% url 'home' %}">
            <div class="brand-icon">
                <i class="bi bi-heart-fill"></i>
            </div>
            <span class="brand-name">Women & Baby Care</span>
        </a>

        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler navbar-toggler-custom" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <i class="bi bi-list"></i>
        </button>

        <!-- Navbar Menu (Collapsible on Mobile) -->
        <div class="collapse navbar-collapse navbar-menu" id="navbarMenu">
            <!-- Center-Left: Navigation Links -->
            <div class="navbar-nav-section">
                <a class="nav-link" href="{% url 'products:list' %}">
                    <i class="bi bi-shop"></i> <span>Products</span>
                </a>
                <a class="nav-link" href="{% url 'cart:summary' %}">
                    <i class="bi bi-bag"></i> <span>Cart</span>
                </a>
            </div>

            <!-- Center: Search Bar -->
            <form method="get" action="{% url 'products:list' %}" class="navbar-search-form">
                <div class="search-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" name="q" class="search-input" placeholder="Search products..." value="{{ request.GET.q }}">
                </div>
                <button type="submit" class="search-btn">
                    <i class="bi bi-search"></i>
                </button>
            </form>

            <!-- Right: Action Buttons -->
            <div class="navbar-actions">
                {% if user.is_authenticated %}
                    <a href="{% url 'orders:list' %}" class="nav-action-link" title="Orders">
                        <i class="bi bi-box-seam"></i>
                        <span>Orders</span>
                    </a>
                    <a href="{% url 'notifications:list' %}" class="nav-action-link notification-link" title="Notifications">
                        <i class="bi bi-bell"></i>
                        <span>Notifications</span>
                    </a>
                    <div class="dropdown">
                        <button class="btn btn-profile dropdown-toggle" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle"></i>
                            <span>Account</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-custom" aria-labelledby="profileDropdown">
                            <li><a class="dropdown-item" href="{% url 'accounts:profile' %}">
                                <i class="bi bi-person"></i> My Profile
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form method="post" action="{% url 'accounts:logout' %}" class="w-100">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item logout-item">
                                        <i class="bi bi-box-arrow-right"></i> Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="btn btn-nav-login">
                        <i class="bi bi-box-arrow-in-right"></i>
                        <span>Login</span>
                    </a>
                    <a href="{% url 'accounts:register' %}" class="btn btn-nav-register">
                        <i class="bi bi-person-plus"></i>
                        <span>Register</span>
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="main-content">
    {% include 'partials/messages.html' %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
